  - id: EVO-2026-02-004
    date: "2026-02-08"
    source: reflection
    priority: low
    status: queued
    summary: "Computed State Over Maintained State Pattern"
    problem: |
      Hardcoded counts (patterns, skills, agents) drift from actual values.
      Static boolean flags in state files become stale. Manual maintenance fails at scale.
    proposal: |
