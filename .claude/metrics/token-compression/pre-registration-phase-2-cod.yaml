# === PROVENANCE ===

provenance:
  filed_by: Jarvis
  filed_at: 2026-05-03                    # date of filing (no specific time; pre-deploy)
  filing_basis: "first-principles design from roadmap §3 Phase 2 + arxiv 2502.18600 + DSPy article"
  honest_disclosure: |
    Hypothesis numbers are derived from first-principles reasoning combined with
    paper-level claims, NOT from prior CoD experiments on Jarvis-style tasks.
    The arxiv paper measures GSM8k (-92.4%); Jarvis tasks are reasoning-shaped
    differently, so the -50% target is conservative-by-half. Per-task-type
    expectations are bracketed by structure-fit reasoning (code_review:
    structured = best fit; research: synthesis = worst fit) without empirical
    backing. Stage 2 outcome will validate or invalidate these brackets.
