    tool_only:
      expected: 0
      tolerance: 0
      reason: "no prose; no effect possible"
    brief:
      expected: -25
      tolerance: 10
      reason: "filler-cutting most visible here"
    interactive:
      expected: -20
      tolerance: 10
      reason: "filler-cutting effective on conversational answers"
