# Pre-Registration — phase-1-1-jeeves-brief
#
# IMPORTANT METHODOLOGICAL NOTE:
#
# This pre-registration was filed POST-HOC on 2026-05-01 ~10:00Z, applying
# the experimental-design protocol (which itself was created on 2026-05-01
# ~05:30Z, also post-deploy) to the historical Phase 1.1 deploy from
# 2026-05-01T03:27:28Z.
#
# Pre-registration normally requires predictions to be filed BEFORE post-deploy
# data exists. That is impossible here because the protocol did not exist when
# the deploy happened. The predictions below are taken VERBATIM from the
# experimental-design doc §8.1 example block, which itself was written from
# first-principles reasoning about Jeeves-Brief's design intent — they are
# recoverable from the directive's text but were not written before the post-
# deploy data was collected.
#
# Honest interpretation: this run validates the protocol's mechanics on real
# data, but does NOT establish a clean per-class effect signal for Phase 1.1.
# The first clean pre-registration in this benchmark family will be Phase 1.5
# (Alfred-Brief) or the rerun of Phase 1.1 once 3+ ordinary post-deploy
# sessions accumulate.

# === IDENTITY ===

