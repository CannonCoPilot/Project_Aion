version: 5
updated: 2026-05-04
# Lean manifest router — `when` shortened to keywords; full descriptions in each SKILL.md / agent .md.
# Model tier: opus=complex/arch, sonnet=implementation/review/testing, haiku=data/status/format.
# v5 (2026-05-04): culled zero-usage skills/agents to _disabled/ during context-budget optimization.

skills:
  # File / system primitives
  - {id: skill.filesystem-ops,   model: haiku,  when: "file rwx, search, mv, mkdir",                file: .claude/skills/filesystem-ops/SKILL.md}
  - {id: skill.git-ops,          model: sonnet, when: "git status/log/diff/branch/commit/push",     file: .claude/skills/git-ops/SKILL.md}
  - {id: skill.web-fetch,        model: sonnet, when: "URL fetch, web search, API call",            file: .claude/skills/web-fetch/SKILL.md}

  # x-ops routers (consolidations; absorbed subskills live in _disabled/)
  - {id: skill.doc-ops,          model: sonnet, when: "Word/Excel/PDF/PowerPoint",                  file: .claude/skills/doc-ops/SKILL.md, absorbs: [docx,xlsx,pdf,pptx]}
  - {id: skill.self-ops,         model: sonnet, when: "self-improve / status / validation (AC-05/06/07/08)", file: .claude/skills/self-ops/SKILL.md, absorbs: [self-improvement,jarvis-status,validation]}
  - {id: skill.mcp-ops,          model: sonnet, when: "MCP/skill build/validate/decompose/create",  file: .claude/skills/mcp-ops/SKILL.md, absorbs: [mcp-builder,mcp-validation,plugin-decompose,skill-creator]}
  - {id: skill.autonom-ops,      model: haiku,  when: "session orchestration: commands, JICM, Ralph", file: .claude/skills/autonom-ops/SKILL.md, absorbs: [autonomous-commands,session-management,context-management,ralph-loop]}
  - {id: skill.dev-ops,          model: sonnet, when: "test W0 from Jarvis-dev, JICM cycles, hooks",  file: .claude/skills/dev-ops/SKILL.md}
  - {id: skill.compose-maintain, model: sonnet, when: "dev-stack compose down/repair/up via ephemeral Claude worker; proxy-safe maintenance", file: .claude/skills/compose-maintain/SKILL.md}

  # Research + memory
  - {id: skill.research-ops,     model: opus,   when: "multi-source research, 15 backends",         file: .claude/skills/research-ops/SKILL.md}
  - {id: skill.knowledge-ops,    model: opus,   when: "4-tier memory: dynamic/static KG, RAG, docs", file: .claude/skills/knowledge-ops/SKILL.md}

  # Tasks
  - {id: skill.pulse-ops,        model: haiku,  when: "Pulse task create/list/update/close",         file: .claude/skills/pulse-ops/SKILL.md}

agents:
  - {id: agent.deep-research,    model: opus,   when: "thorough research with citations",        file: .claude/agents/deep-research.md}
  - {id: agent.code-review,      model: sonnet, when: "technical quality review",                file: .claude/agents/code-review.md}
  - {id: agent.code-analyzer,    model: sonnet, when: "codebase structure / stack / patterns",   file: .claude/agents/code-analyzer.md}
  - {id: agent.code-implementer, model: sonnet, when: "write/modify/refactor code",              file: .claude/agents/code-implementer.md}

patterns:
  - {id: pattern.agent-selection,         when: "tool/skill/agent selection",                  file: .claude/context/patterns/agent-selection-pattern.md}
  - {id: pattern.selection-intelligence,  when: "quick selection guidance",                    file: .claude/context/patterns/selection-intelligence-guide.md}
  - {id: pattern.mcp-loading,             when: "MCP loading strategy",                        file: .claude/context/patterns/mcp-loading-strategy.md}
  - {id: pattern.wiggum-loop,             when: "iterative execution loop (AC-02 default)",    file: .claude/context/patterns/wiggum-loop-pattern.md}
  - {id: pattern.jicm,                    when: "JICM thresholds/flow (AC-04)",                file: .claude/context/patterns/jicm-pattern.md}
  - {id: pattern.startup-protocol,        when: "session start protocol (AC-01)",              file: .claude/context/patterns/startup-protocol.md}
  - {id: pattern.milestone-review,        when: "milestone/PR completion (AC-03)",             file: .claude/context/patterns/milestone-review-pattern.md}
  - {id: pattern.context-budget,          when: "token budgets, MCP tiers",                    file: .claude/context/patterns/context-budget-management.md}
  - {id: pattern.observation-masking,     when: "large tool outputs (80%+ tokens)",            file: .claude/context/patterns/observation-masking-pattern.md}
  - {id: pattern.parallelization,         when: "parallel vs sequential",                      file: .claude/context/patterns/parallelization-strategy.md}
  - {id: pattern.two-stage-gating,        when: "dev change with measurable behavioral effect",file: .claude/context/patterns/two-stage-validation-gating.md}

workflows:
  - {id: flow.jicm-compression, when: "context near threshold, manual",   file: .claude/commands/intelligent-compress.md}
  - {id: flow.meditate-session, when: "session meditation",               file: .claude/commands/meditate-session.md}
  - {id: flow.jicm-manual,      when: "manual JICM cycle",                file: .claude/commands/jicm.md}
  - {id: flow.setup,            when: "initial config",                   file: .claude/commands/setup.md}

components:
  - {id: ac.01-self-launch,        signal: "SessionStart",                                   file: .claude/context/components/AC-01-self-launch.md}
  - {id: ac.02-wiggum-loop,        signal: "always (default execution)",                     file: .claude/context/components/AC-02-wiggum-loop.md}
  - {id: ac.03-milestone-review,   signal: "work completion",                                file: .claude/context/components/AC-03-milestone-review.md}
  - {id: ac.04-jicm,               signal: "context >= threshold",                           file: .claude/context/components/AC-04-jicm.md}
  - {id: ac.05-self-reflection,    signal: "session end / /reflect",                         file: .claude/context/components/AC-05-self-reflection.md}
  - {id: ac.06-self-evolution,     signal: "/evolve, idle",                                  file: .claude/context/components/AC-06-self-evolution.md}
  - {id: ac.07-research,           signal: "/research",                                      file: .claude/context/components/AC-07-rd-cycles.md}
  - {id: ac.08-maintenance,        signal: "/maintain, quarterly",                           file: .claude/context/components/AC-08-maintenance.md}
  - {id: ac.09-session-completion, signal: "/meditate-session",                              file: .claude/context/components/AC-09-session-completion.md}
  - {id: ac.10-ulfhedthnar,        signal: "defeat-signal weight >= 7 / /unleash", status: dormant, file: .claude/context/components/AC-10-ulfhedthnar.md}

  # Aion Quartet (always-on tmux scripts)
  - {id: aion.ennoia,   version: "0.2",   when: "intent-driven orchestration",  file: .claude/scripts/ennoia.sh,        signals: [".ennoia-recommendation",".ennoia-status"]}
  - {id: aion.virgil,   version: "0.2",   when: "task/agent/file tracking",     file: .claude/scripts/virgil.sh,        signals: [".virgil-tasks.json",".virgil-agents.json"]}
  - {id: aion.watcher,  version: "7.9",   when: "JICM context monitoring",      file: .claude/scripts/jicm-watcher.sh,  signals: [".jicm-state-hook.json",".jicm-clear-now.signal",".jicm-resume-complete.signal"]}
  - {id: flow.housekeep,                  when: "infra cleanup, log rotation",  file: .claude/scripts/housekeep.sh}
  - {id: flow.command-handler,            when: "command-signal injection",     file: .claude/scripts/command-handler.sh, signals: [".command-signal"]}

compositions:
  - {id: compose.research-then-implement, steps: [skill.research-ops, agent.code-analyzer, agent.code-implementer], when: "feature requires research before coding"}
  - {id: compose.analyze-then-review,     steps: [agent.code-analyzer, agent.code-review],                          when: "code changes need quality validation"}
  - {id: compose.learn-from-session,      steps: [ac.05-self-reflection, skill.knowledge-ops],                      when: "session end / after corrections"}
