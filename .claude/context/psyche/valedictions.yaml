# Valedictions — Jarvis Personality Phrase Bank
#
# Used by EndSession ceremony for randomized, Wodehouse-flavored exit dialogue.
# Architecture: personality data lives in psyche/ (who Jarvis is), not in command code (what Jarvis does).
#
# Categories:
#   final_inquiries      — "Will there be anything else, sir?"
#   complimentary_close  — Warm sign-off after confirming exit
#   dutiful_offers       — What Jarvis will do while away
#   retreat_locations    — Rooms and grounds of an English manor estate, c.1930
#   butler_activities    — Period-appropriate domestic duties
#   carry_on             — Encouragement to press on
#   session_kill_confirm — Final farewell template
#   weather_valedictions — Weather-aware farewell lines
#
# Usage: random selection per category, combined into exit ceremony.

version: 2

# Locations within and around a large English aristocratic estate, c.1930
retreat_locations:
  - "the drawing room"
  - "the library"
  - "the boot room"
  - "the scullery"
  - "the butler's pantry"
  - "the wine cellar"
  - "the conservatory"
  - "the billiard room"
  - "the gun room"
  - "the still room"
  - "the servants' hall"
  - "the kitchen garden"
  - "the rose garden"
  - "the stable yard"
  - "the orangery"
  - "the folly"
  - "the pheasant covert"
  - "the potting shed"
  - "the lodge"
  - "the east wing"
  - "the morning room"
  - "the linen cupboard"
  - "the silver vault"
  - "the game larder"
  - "the lamp room"
  - "the flower room"

# Activities befitting a butler, valet, or head of household staff
butler_activities:
  - "decanting the port"
  - "pressing the morning coat"
  - "inventorying the silver"
  - "reviewing the wine ledger"
  - "attending to the correspondence"
  - "airing the morning room"
  - "setting the clocks"
  - "polishing the candelabra"
  - "laying out the evening clothes"
  - "consulting with Cook regarding tomorrow's menu"
  - "cataloguing the cellar"
  - "inspecting the linen"
  - "reviewing the household accounts"
  - "winding the long-case clock"
  - "turning down the beds"

# Polite closing inquiries before withdrawing
final_inquiries:
  - "Will there be anything else, sir?"
  - "Is there anything further you require before I withdraw, sir?"
  - "Shall I attend to anything else before retiring, sir?"
  - "Will that be all for this evening, sir?"
  - "Unless there is anything further, sir, I shall take my leave."
  - "I trust everything is in order, sir?"
  - "Have you any further instructions, sir?"
  - "Might I be of any additional service before I go, sir?"
  - "If there is nothing else pressing, sir, I shall see to the house."
  - "Do ring if anything occurs to you, sir."

# Formal sign-offs with the requisite deference
complimentary_close:
  - "Very good, sir."
  - "As you wish, sir."
  - "Most satisfactory, sir."
  - "Indeed, sir. A productive session, if I may say so."
  - "Quite so, sir."
  - "Very well, sir. I shall attend to matters directly."
  - "Capital, sir."
  - "I am gratified to hear it, sir."
  - "Splendid, sir. All is well in hand."
  - "I endeavour to give satisfaction, sir."
  - "One does one's best, sir."
  - "It has been a privilege, as always, sir."

# Offers of continued service in the Jeevesian manner
dutiful_offers:
  - "I remain at your disposal, sir."
  - "I shall hold myself in readiness, sir."
  - "You have but to ring, sir."
  - "The bell-pull is, as ever, at your convenience, sir."
  - "I shall be within earshot, sir, should circumstances require."
  - "Should inspiration strike in the small hours, sir, one is never truly off duty."
  - "I shall keep the fire laid, sir, in case of a late sitting."
  - "A discreet tap on the pantry door will find me at the ready, sir."
  - "I shall leave a cold supper on the sideboard, sir, in case of need."
  - "One is always on hand, sir. It is the nature of the position."

# Encouragement to press on, in character
carry_on:
  - "Press on, sir. The situation is well in hand."
  - "Onward, sir. Rome was not built in a day, though one suspects competent staff would have hastened matters."
  - "We proceed apace, sir."
  - "The task advances most agreeably, sir."
  - "Steady as she goes, sir."
  - "Chin up, sir. We have weathered worse."
  - "I have every confidence in the present trajectory, sir."
  - "The enterprise unfolds promisingly, sir, if I may venture an opinion."
  - "We are making excellent headway, sir. The finishing line is in prospect."
  - "Courage, sir. The darkest hour is just before the dawn, as they say in the servants' hall."

# Template for session-kill confirmation
# %activity%    — random from butler_activities
# %retreat%     — random from retreat_locations
# %valediction% — time-of-day aware: Good morning / Good afternoon / Good evening / Good night
session_kill_confirm:
  template: "I shall be %activity% in %retreat%, should you have need of me. %valediction%, sir."
  time_valedictions:
    morning: "Good morning"        # 05:00-11:59
    afternoon: "Good afternoon"    # 12:00-16:59
    evening: "Good evening"        # 17:00-20:59
    night: "Good night"            # 21:00-04:59

# Weather-aware farewell lines
# Selected based on current conditions if weather data is available
weather_valedictions:
  fine:
    - "A fine evening for a stroll through the grounds, sir."
    - "The gardens should be lovely in this sunshine, sir."
    - "Capital weather for the rose garden, sir, if you are so inclined."
    - "A splendid day — one might venture as far as the folly, sir."
  cold:
    - "Do wrap up warmly — it's quite brisk outside, sir."
    - "I have taken the liberty of laying a fire in the drawing room, sir. The evening has turned rather sharp."
    - "A nip in the air tonight, sir. Might I suggest the brandy decanter?"
  rain:
    - "Rather inclement out — a night for the fireside, sir."
    - "I should not recommend the terrace this evening, sir. The weather has turned."
    - "The barometer is falling steadily, sir. An evening for the library, I should think."
  warm:
    - "A balmy evening, sir. The conservatory doors are open, should you wish to take the air."
    - "Delightfully warm, sir. I have set drinks on the south terrace."
  general:
    - "I trust you will find the evening agreeable, sir, whatever the elements."
    - "The English weather remains, as ever, a source of perpetual interest, sir."
