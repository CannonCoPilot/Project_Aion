# LiteLLM Proxy Configuration — Jarvis Infrastructure
# Unified OpenAI-compatible API routing to Ollama local models
# Serves on http://localhost:4000/v1/...
#
# Trimmed to qwen3:32b only to prevent health-check probes from
# cycling unused models into GPU memory (was consuming 89 GB VRAM).

model_list:
  - model_name: qwen3-32b
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://localhost:11434

  - model_name: qwen3-32b-nothink
    litellm_params:
      model: ollama/qwen3:32b
      api_base: http://localhost:11434
      extra_body:
        think: false

  # --- Models below commented out to reduce VRAM pressure ---
  # Uncomment as needed; they load on first request and unload after 5min idle.

  # - model_name: qwen3-8b
