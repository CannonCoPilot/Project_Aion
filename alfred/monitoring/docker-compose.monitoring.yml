services:
  pushgateway:
    image: prom/pushgateway:latest
    container_name: aifred-pushgateway
    restart: unless-stopped
    ports:
      - "9091:9091"
    networks:
      - aifred-network

  prometheus:
    image: prom/prometheus:latest
    container_name: aifred-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - aifred-network
    depends_on:
      - pushgateway

  grafana:
    image: grafana/grafana:latest
    container_name: aifred-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=aifred
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - aifred-network
    depends_on:
      - prometheus

volumes:
  prometheus-data:
    name: aifred-prometheus-data
  grafana-data:
    name: aifred-grafana-data

networks:
  aifred-network:
    external: true
