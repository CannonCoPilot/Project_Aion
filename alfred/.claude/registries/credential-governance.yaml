      - SUMO_ACCESS_KEY
    allowed_consumers: []
    allowed_personas: []

  # ─── Google Token Vault (added 2026-04-07 post-incident) ─────────
  # These policies govern the 5 credentials held by ~/Code/google-token-vault.
  # All are located in the same .env file, so file_patterns reference it once
  # per credential for clarity in audit logs.
  # Inventory entry: credential-inventory.yaml (vault-* ids)

  - id: vault-google-client-secret
    risk_tier: critical
    file_patterns:
      - "~/Code/google-token-vault/.env"
    variable_names:
      - VAULT_GOOGLE_CLIENT_SECRET
    allowed_consumers: []
    allowed_personas: []
    escalation:
      interactive: hard-block
      headless: telegram

  - id: vault-encryption-key
    risk_tier: critical
    file_patterns:
      - "~/Code/google-token-vault/.env"
    variable_names:
      - VAULT_ENCRYPTION_KEY
    allowed_consumers: []
    allowed_personas: []
    escalation:
      interactive: hard-block
      headless: telegram

  - id: vault-nexus-token
    risk_tier: high-risk
    file_patterns:
      - "~/Code/google-token-vault/.env"
    variable_names:
      - VAULT_NEXUS_TOKEN
    allowed_consumers:
      - pattern: ".claude/jobs/lib/google-api.sh"
        actions: [read]
    allowed_personas: []

  - id: vault-mcp-token
    risk_tier: high-risk
