# Credential Governance Registry
#
# Source of truth for credential scope authorization policies.
# Defines who can access which credentials, for what purpose, and
# how violations escalate.
#
# Companion files:
#   - credential-inventory.yaml:  WHAT exists and WHERE (catalog)
#   - credential-governance.yaml: WHO can access and HOW (this file — policy)
#   - credential-guard.config.js: Runtime JS export (keep in sync)
#   - credential-guard.js:        Enforcement hook (PreToolUse)
#
# Document Guard: critical tier — key_deletion_protection, section_preservation
#
# Last Updated: 2026-03-18
# Owner: Sir

version: 1

defaults:
  risk_tier: standard
  escalation:
    interactive: warn-confirm
    headless: pulse-task

# ─── Risk Tier Escalation Matrix ─────────────────────────────────
#
#   Tier       | Interactive        | Headless
#   -----------|--------------------|--------------------------
#   standard   | warn-confirm       | pulse-task (waiting:david)
#   high-risk  | hard-block         | pulse-task (waiting:david)
#   critical   | hard-block         | telegram + pulse-task
#
# Override mechanism:
#   Interactive: .claude/logs/.credential-guard-overrides.json
#   Headless: No override — must go through Pulse approval

# ─── Policies ────────────────────────────────────────────────────
#
# Schema per entry:
#   id:                 matches credential-inventory.yaml id
#   risk_tier:          standard | high-risk | critical
#   file_patterns:      glob paths to files containing this credential
#   variable_names:     env var names to detect in Bash commands
#   allowed_consumers:
#     - pattern: glob path or script
#       actions: [read, configure, deploy, rotate]
#   allowed_personas:
#     - persona: persona name
#       actions: [read]
#   escalation:         override defaults per-credential
#     interactive: warn-confirm | hard-block
#     headless: pulse-task | telegram | block

policies:

  # ════════════════════════════════════════════════════════════════
  # CRITICAL — Full account takeover, public-facing, financial
  # ════════════════════════════════════════════════════════════════

  - id: cloudflare-api-token
    risk_tier: critical
    file_patterns:
      - "~/Docker/mydocker/cloudflare-exporter/.env"
      - "~/Docker/mydocker/threat-blocklist/.env"
    variable_names:
      - CF_API_TOKEN
      - CF_TOKEN
    allowed_consumers: []
    allowed_personas: []
    escalation:
      interactive: hard-block
      headless: telegram

  - id: cloudflare-tunnel-token
    risk_tier: critical
    file_patterns:
      - "~/Docker/mydocker/teleport/.env"
    variable_names:
      - TUNNEL_TOKEN
    allowed_consumers: []
    allowed_personas: []
    escalation:
      interactive: hard-block
      headless: telegram

  - id: anthropic-api-key
    risk_tier: critical
    file_patterns:
      - "~/.credentials/anthropic-api-key.env"
      - "~/Code/context-structure-research/.env"
      - "~/Code/klyx-terminal/.env"
    variable_names:
      - ANTHROPIC_API_KEY
    allowed_consumers: []
    allowed_personas: []
    escalation:
      interactive: hard-block
      headless: telegram

  - id: stripe-key
    risk_tier: critical
    file_patterns:
      - "~/Code/aifred-document-guard/.env"
    variable_names:
      - STRIPE_KEY
    allowed_consumers: []
    allowed_personas: []
    escalation:
      interactive: hard-block
      headless: telegram

  - id: authentik-secret-key
    risk_tier: critical
    file_patterns:
      - "~/Docker/mydocker/authentik/.env"
    variable_names:
      - AUTHENTIK_SECRET_KEY
    allowed_consumers: []
    allowed_personas: []
    escalation:
      interactive: hard-block
      headless: telegram

  - id: n8n-encryption-key
    risk_tier: critical
    file_patterns:
      - "~/Docker/mydocker/n8n/docker-compose.yml"
    variable_names:
      - N8N_ENCRYPTION_KEY
    allowed_consumers: []
    allowed_personas: []
    escalation:
      interactive: hard-block
      headless: telegram

  - id: unifi-admin
    risk_tier: critical
    file_patterns:
      - "~/Docker/mydocker/homepage/config/.env"
      - "~/Docker/mydocker/threat-blocklist/.env"
    variable_names:
      - UDM_USERNAME
      - UDM_PASSWORD
      - HOMEPAGE_VAR_UNIFI_USERNAME
      - HOMEPAGE_VAR_UNIFI_PASSWORD
    allowed_consumers: []
    allowed_personas: []
    escalation:
      interactive: hard-block
      headless: telegram

  - id: ssh-keys
    risk_tier: critical
    file_patterns:
      - "~/.ssh/*"
    variable_names: []
    allowed_consumers: []
    allowed_personas: []
    escalation:
      interactive: hard-block
      headless: telegram

  # ════════════════════════════════════════════════════════════════
  # HIGH-RISK — Infrastructure access, service modification
  # ════════════════════════════════════════════════════════════════

  - id: openai-api-key
    risk_tier: high-risk
    file_patterns:
      - "~/.credentials/openai-api-key.env"
      - "~/Code/aifred-document-guard/.env"
    variable_names:
      - OPENAI_KEY
    allowed_consumers: []
    allowed_personas: []

  - id: github-pat
    risk_tier: high-risk
    file_patterns: []
    variable_names:
      - GITHUB_TOKEN
      - GH_TOKEN
    allowed_consumers: []
    allowed_personas: []

  - id: telegram-bot-token
    risk_tier: high-risk
    file_patterns: []
    variable_names:
      - TELEGRAM_BOT_TOKEN
    allowed_consumers:
      - pattern: ".claude/jobs/lib/send-telegram.sh"
        actions: [read]
    allowed_personas:
      - persona: ai-david
        actions: [read]
      - persona: dispatcher
        actions: [read]
      - persona: executor
        actions: [read]

  - id: bluehost-ftp
    risk_tier: high-risk
    file_patterns:
      - "~/.credentials/bluehost-ftp.env"
      - "~/AIProjects/.credentials/bluehost-ftp.env"
    variable_names:
