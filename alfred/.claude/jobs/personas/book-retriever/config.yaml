persona: book-retriever

engine:
  default: claude-code
  model: sonnet
  fallback: null

limits:
  max_turns: 15
  max_budget_usd: 1.50
  timeout_minutes: 10

output:
  format: json
  save_to: .claude/logs/headless/executions/

session:
  persist: false

# MCP requirements — these must be present in alfred/.mcp.json for chain
# sessions to inherit them. The executor does not dynamically load MCPs;
# they are inherited from the working directory's .mcp.json at session start.
# Verify with: jq '.mcpServers | keys' alfred/.mcp.json
mcps_required:
  - annas-archive
