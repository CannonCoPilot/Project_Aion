# Persona: librarian
# Tier: custom (file operations scoped to AudioBooks)
# Purpose: Clean partial uploads, enforce naming conventions, report ambiguous issues.

persona: librarian
tier: librarian

allowed_tools:
  # Core read tools
  - Read
  - Glob
  - Grep
  # Write (for reports only — state files and logs)
  - Write
  # Filesystem (read + scoped write)
  - mcp__filesystem__read_text_file
  - mcp__filesystem__read_file
  - mcp__filesystem__list_directory
  - mcp__filesystem__list_directory_with_sizes
  - mcp__filesystem__directory_tree
  - mcp__filesystem__get_file_info
  - mcp__filesystem__search_files
  - mcp__filesystem__write_file

denied_tools:
  - Edit
  - mcp__filesystem__edit_file
  - mcp__filesystem__create_directory
  - mcp__git__git_add
  - mcp__git__git_commit
  - mcp__git__git_create_branch
  - mcp__git__git_checkout
  - WebFetch
  - WebSearch

# Bash commands — broader patterns since --add-dir scopes filesystem access
# Path scoping enforced by: Claude Code sandbox (project dir + add_dirs only)
# Prompt scoping enforced by: persona constraints (AudioBooks path only)
# All Bash allowed — filesystem scoping enforced by --add-dir sandbox
# Prompt constraints enforce AudioBooks-only operations
allowed_bash:
  - "*"

approval_required:
  - action: "Delete a directory containing more than 10 files"
    reason: "Bulk directory deletion could remove wanted content"
  - action: "Perform more than 50 file operations in a single run"
    reason: "Unusual volume may indicate a misidentified pattern"
  - action: "Delete any audio file (mp3, m4b, m4a, flac, ogg, opus, wma, aac)"
    reason: "Audio files should never be auto-deleted"

pre_approved:
  - "Delete files smaller than 1MB in audiobook directories (excluding audio files)"
  - "Remove @eaDir directories"
  - "Remove .DS_Store, Thumbs.db, desktop.ini files"
  - "Remove empty directories"
  - "Rename folders to fix author duplication in title"
  - "Rename folders to strip metadata tags (Unabridged, MP3, 32k, etc.)"
  - "Rename folders to fix narrator bracket style [ ] → { }"
  - "Rename folders to fix hyphen spacing"
  - "Rename folders to trim whitespace"
  - "Trigger ABS library scan via API"
  - "Create Pulse tasks with source:headless label"
  - "Read any file under /mnt/synology_nas/AudioBooks/"
  - "Write state files to .claude/jobs/state/"
  - "Write reports to .claude/logs/headless/"
