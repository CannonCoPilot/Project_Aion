# Persona: investigator
# Tier: discovery (read-only)
# Purpose: Observe, analyze, report. Never modify.

persona: investigator
tier: discovery

allowed_tools:
  # Core read tools
  - Read
  - Glob
  - Grep
  # Web access
  - WebFetch
  - WebSearch
  # Git (read-only)
  - mcp__git__git_status
  - mcp__git__git_log
  - mcp__git__git_diff
  - mcp__git__git_show
  # Filesystem (read-only)
  - mcp__filesystem__read_text_file
  - mcp__filesystem__read_file
  - mcp__filesystem__list_directory
  - mcp__filesystem__list_directory_with_sizes
  - mcp__filesystem__directory_tree
  - mcp__filesystem__get_file_info
  - mcp__filesystem__search_files
  # MCP Gateway (read-only)
  - mcp__mcp-gateway__read_graph
  - mcp__mcp-gateway__search_nodes
  - mcp__mcp-gateway__open_nodes

denied_tools:
  - Edit
  - Write
  - mcp__filesystem__write_file
  - mcp__filesystem__edit_file
  - mcp__filesystem__create_directory
  - mcp__filesystem__move_file
  - mcp__git__git_add
  - mcp__git__git_commit
  - mcp__git__git_create_branch

# Bash: wildcard allowed for read operations. Safety model:
#   Layer 1: denied_tools blocks Write/Edit/git-commit (enforced by executor)
#   Layer 2: Prompt constraints declare "read-only, never modify"
#   Layer 3: Job budget + timeout limits blast radius
# RISK: Claude could run destructive bash (rm, git push) if it ignores prompt.
# MITIGATION: Accepted risk — restrictive bash patterns break pipes/loops.
# FUTURE: Phase 4 multi-agent could add a pre-execution bash validator hook.
allowed_bash:
  - "*"

pre_approved:
  - "Read any file on the system"
  - "Query any Docker container status"
  - "Check service health endpoints"
  - "Search the web for documentation"
  - "Read the knowledge graph"
  - "Read Pulse task list"
