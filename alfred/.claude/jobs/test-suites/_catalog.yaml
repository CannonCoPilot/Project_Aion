  - id: reviewer-pass-fail
    name: "Reviewer Pass/Fail Pair"
    file: null
    status: active
    priority: P1
    task_count: 2
    expected_runtime_min: 5
    description: >
      Two tasks: one designed to pass review (creates expected file), one designed
      to fail review (creates file at WRONG path so reviewer sees MISSING). Tests
      reviewer accuracy in both directions + diagnose recovery.
    components_tested:
      - reviewer.py (pass path)
      - reviewer.py (fail path)
      - diagnose.py (triggered on fail)
    behaviors_tested:
      - Review pass with filesystem evidence
      - Review fail detection (MISSING file triggers fail)
      - Diagnose recovery cycle
      - retry_count increment
    inline_tasks:
      - title: "PROBE-PASS: Create reviewer-pass.txt correctly"
        description: "Create reviewer-pass.txt in the output directory with content 'Reviewer pass test - success'. Verify it exists and print full path."
        labels: ["project:reviewer-test", "staging:wait", "blocked:no", "active:no", "completed:no", "evaluated:no", "queued:no", "risk:safe", "type:verify"]
      - title: "PROBE-FAIL: Write file to wrong subdirectory"
        description: "Create reviewer-fail.txt but write it to a subdirectory called 'wrong-place' inside the output directory (e.g. output/reviewer-test/wrong-place/reviewer-fail.txt). The reviewer expects the file at output/reviewer-test/reviewer-fail.txt, so this should fail review."
        labels: ["project:reviewer-test", "staging:wait", "blocked:no", "active:no", "completed:no", "evaluated:no", "queued:no", "risk:safe", "type:verify"]
    validation:
      last_run: "2026-05-29T17:29:46Z"
      last_result: pass
      last_commit: null
      notes: "Both tasks passed. PROBE-FAIL did not trigger reviewer failure — executor was smart enough to create file at correct path despite misleading description. Tests reviewer pass path and full lifecycle; does NOT test reviewer fail path."

  - id: self-healing-cycle
    name: "Self-Healing Cycle"
    file: null
    status: active
    priority: P1
    task_count: 1
    expected_runtime_min: 8
    description: >
      Task that writes to wrong output directory on first attempt. Reviewer fails it,
      diagnose identifies the path issue, redesigns the description with the correct
      path, and the retry succeeds. Tests the full fail → diagnose → retry → pass cycle.
    components_tested:
      - reviewer.py (fail detection)
      - diagnose.py (root cause + label reset + description rewrite)
      - pipeline-watcher.py (retry dispatch)
      - executor.py (executor_attempts tracking)
    behaviors_tested:
      - executor_attempts increment and reset by diagnose
      - lifecycle_resets increment
      - diagnose_output propagation to retry context
      - Full self-healing loop (fail → diagnose → re-stage → re-execute → pass)
    inline_task:
      title: "PROBE-HEAL: Create healing-test.txt (initially wrong path)"
      description: "Create healing-test.txt in a subdirectory called 'scratch' inside the output directory (output/heal-test/scratch/healing-test.txt). Write 'Self-healing test content' as the file content. NOTE: The reviewer expects files directly in output/heal-test/, not in a subdirectory."
      labels: ["project:heal-test", "staging:wait", "blocked:no", "active:no", "completed:no", "evaluated:no", "queued:no", "risk:safe", "type:verify"]
    validation:
      last_run: "2026-05-29T17:28:00Z"
      last_result: pass
      last_commit: null
      notes: "Passed first try. Executor created file at correct path despite description specifying wrong subdirectory. Did NOT exercise the fail→diagnose→retry cycle. Needs redesign to force executor failure."

  - id: sentinel-timeout
    name: "Sentinel Timeout"
    file: null
    status: active
    priority: P1
    task_count: 1
    expected_runtime_min: 3
    description: >
      Task with a very short executor timeout (1 minute). The task asks for work
      that takes longer than 1 minute, so the sentinel never arrives in time.
      Tests the bridge timeout path, result file generation (returncode 124),
      and pipeline-watcher's executor_attempts cap leading to blocked:yes.
    components_tested:
      - host-executor-bridge.sh (timeout path)
      - executor.py (timeout result handling)
      - pipeline-watcher.py (executor_attempts cap → blocked:yes)
    behaviors_tested:
      - Sentinel timeout detection (returncode 124)
      - Timeout result file written by bridge
      - executor_attempts increment per timeout
      - Task blocking after max attempts (3)
      - reason:max-executor-retries label
    inline_task:
      title: "PROBE-TIMEOUT: Deliberate sentinel timeout test"
      description: "This is a timeout test. Wait for exactly 90 seconds using 'sleep 90' before doing anything else. After the sleep, create timeout-test.txt in the output directory. IMPORTANT: You MUST run the sleep command first."
      labels: ["project:timeout-test", "staging:wait", "blocked:no", "active:no", "completed:no", "evaluated:no", "queued:no", "risk:safe", "type:verify"]
    timeout_override_minutes: 1
    validation:
      last_run: "2026-05-29T17:30:36Z"
      last_result: pass
      last_commit: null
      notes: "First attempt timed out correctly (executor_attempts=1, returncode 124). Diagnose rewrote description removing sleep instruction. Second attempt completed quickly and passed review. Validates timeout detection + self-healing recovery."

