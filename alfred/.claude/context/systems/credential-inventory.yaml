# NEXUS CREDENTIAL PERMISSIONS
# ════════════════════════════════════════════════════════════════════

nexus_credential_permissions:
  ai-david:
    allowed:
      - credential_id: telegram-bot-token
        operations: [send-message]
      - credential_id: telegram-chat-id
        operations: [read]
    denied:
      - credential_id: cloudflare-api-token
        reason: "DNS/firewall changes require human approval"
      - credential_id: authentik-secret-key
        reason: "SSO compromise has infrastructure-wide impact"
      - credential_id: unifi-admin
        reason: "Network infrastructure changes require human approval"
      - credential_id: ssh-keys
        reason: "SSH access to other hosts requires human approval"
      - credential_id: stripe-key
        reason: "Financial operations require human approval"
      - credential_id: n8n-encryption-key
        reason: "Rotation destroys all stored credentials"
      - credential_id: docker-control-api-token
        reason: "Container management requires human approval"
    unauthorized_access_action: block

  dispatcher:
    allowed:
      - credential_id: telegram-bot-token
        operations: [send-message]
      - credential_id: telegram-chat-id
        operations: [read]
    denied: []
    unauthorized_access_action: log

  executor:
    allowed:
      - credential_id: telegram-bot-token
        operations: [send-message]
      - credential_id: telegram-chat-id
        operations: [read]
    denied:
      - credential_id: cloudflare-api-token
        reason: "DNS changes require human approval"
      - credential_id: unifi-admin
        reason: "Network changes require human approval"
    unauthorized_access_action: warn

# ════════════════════════════════════════════════════════════════════
# ISSUES & FINDINGS
# ════════════════════════════════════════════════════════════════════

findings:
  hardcoded_secrets:
    - file: ~/Docker/mydocker/misp/docker-compose.yml
      issue: "Redis password hardcoded as 'redispassword'"
      severity: medium
      remediation: "Move to .env file"
    - file: ~/Docker/mydocker/docker-control-api/docker-compose.yml
      issue: "AUTH_TOKEN hardcoded in compose file"
      severity: high
      remediation: "Move to .env file, add to .gitignore"
    - file: ~/Docker/mydocker/misp/docker-compose.yml
      issue: "SUPERVISOR_PASSWORD hardcoded as 'supervisor'"
      severity: medium
      remediation: "Move to .env file"

  password_reuse:
    - issue: "Same PostgreSQL password used across n8n, pgvector, and OpenWebUI"
      affected: [n8n-postgres-password]
      severity: high
      remediation: "Generate unique passwords per service"

  credential_duplication:
    - issue: "Bishop Scheduler credentials duplicated in 3 .env files"
      affected: [time-scheduler-secrets]
      severity: low
      remediation: "Consolidate to single .env, symlink or docker-compose env_file"
    - issue: "Anthropic API key in multiple project .env files"
      affected: [anthropic-api-key]
      severity: medium
      remediation: "Source from ~/.credentials/ centrally"
    - issue: "Supabase GRC credentials duplicated between Docker and Code dirs"
      affected: [supabase-grc-passwords]
      severity: medium
      remediation: "Single source of truth, reference via env_file"

  missing_location:
    - credential_id: github-pat
      issue: "Storage location unknown — need to check git credential helper"
    - credential_id: telegram-bot-token
      issue: "Referenced in scripts but actual .env file not located"

  legacy_credentials:
    - credential_id: oauth2-proxy-client
      issue: "OAuth2-Proxy appears to be legacy — Authentik is primary SSO"
      remediation: "Verify if still in use, decommission if not"
    - credential_id: caddy-mysql-passwords
      issue: "MySQL passwords in Caddy .env — unclear what service uses them"
      remediation: "Investigate and remove if unused"

  not_yet_inventoried:
