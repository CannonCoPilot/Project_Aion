        format: env-file
        variable: AUTHENTIK_SECRET_KEY
    consumers:
      - name: Authentik Server
        purpose: Session encryption, CSRF, OAuth flows
      - name: Authentik Worker
        purpose: Background task encryption
    rotation:
      last_rotated: unknown
      schedule: manual
    risk_if_leaked: critical
    notes: Compromise allows session forgery for all Authentik-protected services

  - id: authentik-bootstrap-password
    name: Authentik Bootstrap Admin Password
    type: password
    scope: Initial admin account for Authentik
    stored_at:
      - location: ~/Docker/mydocker/authentik/.env
        format: env-file
        variable: AUTHENTIK_BOOTSTRAP_PASSWORD
    consumers:
      - name: Authentik (initial setup only)
        purpose: First-run admin account creation
    rotation:
      last_rotated: unknown
      schedule: never
    risk_if_leaked: high
    notes: May be commented out — verify if still active

  - id: authentik-automation-token
    name: Authentik Automation Token
    type: token
    scope: Service-to-service authentication bypassing Authentik forward auth
    stored_at:
      - location: ~/Docker/mydocker/caddy/.env
        format: env-file
        variable: AUTHENTIK_AUTOMATION_TOKEN
    consumers:
      - name: Caddy reverse proxy
        purpose: Header-based auth bypass for internal service calls
      - name: Homepage Dashboard
        purpose: Authentik API queries (HOMEPAGE_VAR_AUTHENTIK_TOKEN)
      - name: Homepage Dashboard
        purpose: n8n webhook auth (HOMEPAGE_VAR_SERVICE_CONTROL_TOKEN)
    rotation:
      last_rotated: unknown
      schedule: manual
    risk_if_leaked: high
    notes: Bypasses SSO — any request with this header skips authentication

