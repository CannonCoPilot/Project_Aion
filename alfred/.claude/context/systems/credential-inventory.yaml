  - id: cloudflare-api-token
    name: Cloudflare API Token
    type: api-key
    scope: DNS management, firewall rules, metrics for example.com zone
    stored_at:
      - location: ~/Docker/mydocker/cloudflare-exporter/.env
        format: env-file
        variable: CF_API_TOKEN
      - location: ~/Docker/mydocker/threat-blocklist/.env
        format: env-file
        variable: CF_TOKEN
    consumers:
      - name: Cloudflare Exporter
        purpose: Prometheus metrics collection from Cloudflare
      - name: Threat Blocklist Service
        purpose: Firewall rule management for IP blocking
    rotation:
      last_rotated: unknown
      schedule: manual
    risk_if_leaked: critical
    notes: May be same token or separate scoped tokens — verify. Controls DNS for all public services.

