# Credential Inventory
#
# Purpose: Single source of truth for all credentials, tokens, and secrets
#          used across the homelab infrastructure.
#
# This file does NOT contain actual secrets — only metadata about where
# credentials live, what they access, and who/what consumes them.
#
# Companion: .claude/registries/credential-governance.yaml
#   (scope authorization policies — who can access what, escalation rules)
#
# Last Updated: 2026-03-18
# Last Reviewed: 2026-03-12 (Quarterly Review - task-executor)
# Owner: Sir

# ─── Schema ───────────────────────────────────────────────────────────
#
# Each credential entry follows this structure:
#
#   - id: unique-kebab-case-identifier
#     name: Human-readable name
#     type: api-key | token | password | ssh-key | certificate | oauth-client | service-account
#     scope: What this credential grants access to (be specific)
#     stored_at: Where the actual secret value lives
#       - location: File path, env var name, or secret store reference
#         format: env-file | env-var | config-file | systemd-env | docker-secret | keyring | ssh-file
#     consumers: What systems/services/scripts use this credential
#       - name: Consumer name
#         purpose: Why it needs this credential
#     rotation:
#       last_rotated: date or "unknown"
#       schedule: manual | quarterly | annual | never | unknown
#     risk_if_leaked: low | medium | high | critical
#     notes: Optional context
#
# ─── Risk Classification ──────────────────────────────────────────────
#
#   critical: Full account takeover, public-facing services, financial impact
#   high:     Access to infrastructure, can modify services or data
#   medium:   Internal service access, limited blast radius
#   low:      Read-only, internal-only, easily rotated
#
# ─── Inventory ────────────────────────────────────────────────────────

credentials:

  # ════════════════════════════════════════════════════════════════════
