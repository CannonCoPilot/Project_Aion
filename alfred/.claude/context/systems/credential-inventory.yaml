  # ─── Google Token Vault (added 2026-04-07 post-incident) ─────────────
  # These credentials are held by ~/Code/google-token-vault — a FastAPI
  # service that stores Google OAuth refresh tokens and vends access tokens
  # to homelab-mcp, n8n, and Nexus jobs. The vault was publicly exposed
  # without auth from 2026-03-25 through 2026-04-07 due to a missing
  # authentik_forward_auth import in the Caddyfile and VAULT_AUTH_ENFORCE=false.
  # All 5 credentials should be considered potentially-exposed for that window.

  - id: vault-google-client-secret
    name: Google OAuth Client Secret (token vault)
    type: oauth-client
    scope: OAuth2 code→token exchange for Google APIs (Gmail, Calendar, Drive, Docs, Sheets, Slides, Tasks, Contacts)
    stored_at:
      - location: ~/Code/google-token-vault/.env
        format: env-file
        variable: VAULT_GOOGLE_CLIENT_SECRET
    consumers:
      - name: google-token-vault container
        purpose: Exchange auth codes for refresh tokens during OAuth consent flow
      - name: google-token-vault container
        purpose: Refresh access tokens for API consumers
    rotation:
      last_rotated: unknown
      schedule: manual
      notes: Rotation requires updating Google Cloud Console AND re-running consent flow
    risk_if_leaked: critical
    notes: "EXPOSED 2026-03-25 to 2026-04-07 via services.example.com. Pending rotation per Tier 1 remediation plan."

  - id: vault-encryption-key
    name: Token Vault Fernet Encryption Key
    type: token
    scope: Fernet symmetric key used to encrypt refresh_token column at rest in google_token_vault postgres table
    stored_at:
      - location: ~/Code/google-token-vault/.env
        format: env-file
        variable: VAULT_ENCRYPTION_KEY
    consumers:
      - name: google-token-vault container
        purpose: Encrypt/decrypt refresh_token column on write/read
    rotation:
      last_rotated: unknown
      schedule: manual
      notes: "Rotation requires re-encrypting all stored refresh tokens. Non-trivial — coordinated migration needed."
    risk_if_leaked: critical
    notes: "EXPOSED 2026-03-25 to 2026-04-07 alongside encrypted tokens in shared postgres-unified DB. If DB was also accessed during exposure window, all refresh tokens could be decrypted offline."

  - id: vault-nexus-token
    name: Token Vault Nexus Service Token
    type: token
    scope: Authenticates Nexus jobs and the .claude/jobs/lib/google-api.sh helper to the token vault's X-Service-Token header
    stored_at:
      - location: ~/Code/google-token-vault/.env
        format: env-file
        variable: VAULT_NEXUS_TOKEN
    consumers:
      - name: .claude/jobs/lib/google-api.sh
        purpose: Nexus headless jobs that call Google APIs
    rotation:
      last_rotated: unknown
      schedule: manual
    risk_if_leaked: high
    notes: "EXPOSED 2026-03-25 to 2026-04-07. Rotation requires coordinated update of .env + any consumer scripts that hold the token."

  - id: vault-mcp-token
    name: Token Vault MCP Service Token
    type: token
    scope: Authenticates homelab-mcp tools (gmail_search, calendar_list, etc.) to the token vault's X-Service-Token header
    stored_at:
      - location: ~/Code/google-token-vault/.env
        format: env-file
        variable: VAULT_MCP_TOKEN
      - location: ~/.config/systemd/user/homelab-mcp.service
        format: systemd-env
        variable: VAULT_MCP_TOKEN
    consumers:
      - name: homelab-mcp systemd service
        purpose: All Google API tool invocations from Claude Code via homelab-mcp
    rotation:
      last_rotated: unknown
      schedule: manual
    risk_if_leaked: high
    notes: "EXPOSED 2026-03-25 to 2026-04-07. Token is duplicated across vault .env and systemd service file — rotation requires coordinated update of both + systemctl --user restart homelab-mcp."

  - id: vault-n8n-token
    name: Token Vault n8n Service Token
    type: token
    scope: Authenticates n8n workflows to the token vault's X-Service-Token header
    stored_at:
      - location: ~/Code/google-token-vault/.env
        format: env-file
        variable: VAULT_N8N_TOKEN
    consumers:
      - name: n8n workflows (if any are using the vault)
        purpose: Google API access from n8n workflows
    rotation:
      last_rotated: unknown
      schedule: manual
    risk_if_leaked: high
    notes: "EXPOSED 2026-03-25 to 2026-04-07. Verify whether any n8n workflows actually use the vault before rotation — if unused, consider removing the token entirely."

